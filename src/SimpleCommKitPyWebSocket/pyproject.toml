[build-system]
requires = ["setuptools>=42"]
build-backend = "setuptools.build_meta"

[project]
name = "simple-comm-kit-websocket"
dynamic = ["version"]
description = "SimpleCommKitPyWebSocket - Python bindings for SimpleCommKit WebSocket C++ library"
requires-python = ">=3.8"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.dynamic]
version = {file = "../../VERSION"}
