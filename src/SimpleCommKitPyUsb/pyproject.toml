[build-system]
requires = ["setuptools>=42"]
build-backend = "setuptools.build_meta"

[project]
name = "simple-comm-kit-usb"
version = "0.1.0"
description = "SimpleCommKitPyUsb - Python bindings for SimpleCommKit USB C++ library"
requires-python = ">=3.8"

[tool.setuptools.packages.find]
where = ["src"]
